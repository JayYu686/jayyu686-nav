<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3840 2160" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Subtle white wrinkled paper texture">
  <defs>
    <linearGradient id="paperBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffefb" />
      <stop offset="52%" stop-color="#f7f3eb" />
      <stop offset="100%" stop-color="#efe8da" />
    </linearGradient>

    <radialGradient id="paperSheen" cx="50%" cy="-6%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.88" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.36" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>

    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" seed="11" stitchTiles="stitch" result="noise" />
      <feColorMatrix in="noise" type="saturate" values="0" result="mono" />
      <feComponentTransfer in="mono" result="grain">
        <feFuncA type="table" tableValues="0 0.018" />
      </feComponentTransfer>
    </filter>

    <filter id="softWrinkle" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="1.8" />
    </filter>
  </defs>

  <rect width="3840" height="2160" fill="url(#paperBase)" />
  <rect width="3840" height="2160" fill="url(#paperSheen)" />

  <g opacity="0.42" stroke-linecap="round" stroke-linejoin="round" filter="url(#softWrinkle)">
    <path d="M-180 410 C 440 360, 950 530, 1530 455 S 2700 340, 4020 520" fill="none" stroke="#d8cfbf" stroke-width="3" />
    <path d="M-120 790 C 540 700, 1020 900, 1680 820 S 2880 660, 3980 860" fill="none" stroke="#d4cab8" stroke-width="4" />
    <path d="M-240 1120 C 500 1010, 1000 1220, 1720 1110 S 2980 940, 4100 1150" fill="none" stroke="#d6cdbd" stroke-width="3.4" />
    <path d="M-180 1490 C 420 1360, 1140 1610, 1820 1490 S 3000 1280, 4040 1510" fill="none" stroke="#d2c7b5" stroke-width="3.2" />
    <path d="M-200 1870 C 520 1720, 1220 1970, 2010 1830 S 3220 1620, 4080 1860" fill="none" stroke="#d1c5b1" stroke-width="3" />

    <path d="M320 2160 C 210 1530, 340 1000, 180 0" fill="none" stroke="#e1d7c6" stroke-width="2.5" opacity="0.85" />
    <path d="M980 2160 C 860 1560, 1020 1080, 900 0" fill="none" stroke="#dccfb9" stroke-width="2.8" opacity="0.8" />
    <path d="M1700 2160 C 1540 1640, 1760 1180, 1590 0" fill="none" stroke="#d8cbb5" stroke-width="2.6" opacity="0.78" />
    <path d="M2460 2160 C 2300 1600, 2520 1180, 2370 0" fill="none" stroke="#d9ccb7" stroke-width="2.7" opacity="0.82" />
    <path d="M3190 2160 C 3030 1520, 3270 980, 3120 0" fill="none" stroke="#d8ccb8" stroke-width="2.4" opacity="0.8" />
  </g>

  <g opacity="0.23">
    <ellipse cx="680" cy="460" rx="490" ry="170" fill="#ffffff" />
    <ellipse cx="3020" cy="510" rx="580" ry="210" fill="#ffffff" />
    <ellipse cx="1510" cy="1460" rx="760" ry="250" fill="#f5efe3" />
    <ellipse cx="3450" cy="1700" rx="600" ry="230" fill="#f2ebdd" />
  </g>

  <rect width="3840" height="2160" fill="#000" filter="url(#paperNoise)" opacity="1" />
</svg>
